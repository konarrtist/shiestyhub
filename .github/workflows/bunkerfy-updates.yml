name: Bunkerfy Update Announcer

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed   # para detectar merges

jobs:
  announce:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Send Discord webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # ¿Es un merge de Pull Request?
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            TITLE="🚀 Pull Request Merged"

            MESSAGE="${{ github.event.pull_request.title }}"
            AUTHOR="${{ github.event.pull_request.user.login }}"
            BRANCH="${{ github.event.pull_request.base.ref }}"
            LINK="${{ github.event.pull_request.html_url }}"

          else
            # Evento PUSH normal (commit a main)
            TITLE="📌 New Commit Pushed"

            MESSAGE="${{ github.event.head_commit.message }}"
            AUTHOR="${{ github.event.head_commit.author.name }}"
            BRANCH="${{ github.ref_name }}"
            # Link HTML bonito al commit (no el de la API)
            LINK="${{ github.event.repository.html_url }}/commit/${{ github.sha }}"
          fi

          # Construimos el JSON de forma segura con jq
          PAYLOAD=$(jq -n \
            --arg content "@everyone **Update applied on bunkerfy.top**" \
            --arg title "$TITLE" \
            --arg msg "$MESSAGE" \
            --arg author "$AUTHOR" \
            --arg branch "$BRANCH" \
            --arg link "$LINK" \
            --arg time "$(date --utc +%FT%TZ)" '
          {
            content: $content,
            embeds: [
              {
                title: $title,
                description: "Summary",
                color: 9807270,
                fields: [
                  {
                    name: "Details",
                    value: (
                      "Message: " + $msg
                      + "\nAuthor: " + $author
                      + "\nBranch: `" + $branch + "`"
                      + "\nLink: " + $link
                    )
                  }
                ],
                footer: { text: "bunkerfy update notifier" },
                timestamp: $time
              }
            ]
          }')

          curl -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$WEBHOOK"
